# Tech & Web Electronics E-commerce — Enums & Contracts (V1 Legacy, P1)
# Format: YAML for easy import in Django/TS.

currency:
  default: XOF
  symbol: "FCFA"

feature_flags:
  DEALS_ENABLED: true
  COUPONS_ENABLED: true
  WHATSAPP_NOTIF_ENABLED: true
  EMAIL_NOTIF_ENABLED: true
  ONLINE_PAYMENTS_ENABLED: false  # hard-off in V1
  WISHLIST_ENABLED: false         # hard-off in V1 (must remain absent)

payment_methods:
  - COD

order_status:
  - NEW
  - CONFIRMED
  - PACKING
  - OUT_FOR_DELIVERY
  - DELIVERED
  - CANCELLED

availability_status:
  - IN_STOCK
  - AVAILABLE_SOON
  - OUT_OF_STOCK

inventory_source_type:
  - INTERNAL
  - PARTNER
  - CONSIGNMENT

review_status:
  - PENDING
  - APPROVED
  - REJECTED

qna_status:
  - PENDING
  - APPROVED
  - REJECTED

content_section_type:
  - HERO
  - BRANDS
  - DEALS
  - BEST_SELLERS
  - NEW_ARRIVALS
  - CATEGORY_GRID
  - BANNER
  - CUSTOM

deal_type:
  - PERCENT
  - AMOUNT

deal_scope:
  - PRODUCT
  - CATEGORY
  - BRAND

coupon_type:
  - PERCENT
  - AMOUNT

roles:
  OWNER_ADMIN:
    description: Full access
  CATALOG_MANAGER:
    description: Products/variants/media/brands/categories/attributes
  STOCK_MANAGER:
    description: Inventory sources/items, stock ledger
  ORDER_MANAGER:
    description: Orders, fulfillment, statuses, printing docs
  SUPPORT:
    description: Reviews moderation, Q&A moderation, returns
  DELIVERY:
    description: View assigned deliveries, register COD collection (optional)

permissions:
  catalog:
    - catalog.read
    - catalog.write
  inventory:
    - inventory.read
    - inventory.write
    - inventory.ledger
  orders:
    - orders.read
    - orders.write
    - orders.status
    - orders.assign_driver
  cod:
    - cod.read
    - cod.write
    - cod.reconcile
  promotions:
    - promotions.read
    - promotions.write
  content:
    - content.read
    - content.write
  moderation:
    - moderation.reviews
    - moderation.qna
    - moderation.returns
  security:
    - security.users
    - security.roles
    - audit.read

rbac_matrix:
  OWNER_ADMIN:
    - "*"
  CATALOG_MANAGER:
    - catalog.read
    - catalog.write
    - promotions.read
    - content.read
  STOCK_MANAGER:
    - inventory.read
    - inventory.write
    - inventory.ledger
    - catalog.read
  ORDER_MANAGER:
    - orders.read
    - orders.write
    - orders.status
    - orders.assign_driver
    - cod.read
    - cod.write
    - cod.reconcile
  SUPPORT:
    - moderation.reviews
    - moderation.qna
    - moderation.returns
    - orders.read
    - content.read
  DELIVERY:
    - orders.read
    - cod.write

hard_constraints:
  - "No wishlist tables/routes/UI anywhere in V1."
  - "No public exposure of sourcing type or vendor/marketplace wording."
  - "Only COD payment method in V1."
