                amount: { type: integer }
                collected_by: { type: string, description: "Driver/staff identifier" }
                proof_url: { type: string, nullable: true }
                collected_at: { type: string, format: date-time }
              required: [order_id, amount, collected_by, collected_at]
      responses:
