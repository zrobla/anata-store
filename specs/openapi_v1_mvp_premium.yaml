          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [NEW, CONFIRMED, PACKING, OUT_FOR_DELIVERY, DELIVERED, CANCELLED]
              required: [status]
      responses:
        "200": { description: Updated }

